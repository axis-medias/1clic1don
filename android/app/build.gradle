import java.util.Properties

plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

android {
    namespace = "fr.u1clic1don.clic_1_don"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId = "fr.u1clic1don.clic_1_don"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.compileSdkVersion
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    signingConfigs {
        release {
            storeFile file(localProperties.getProperty('storeFile'))
            storePassword localProperties.getProperty('storePassword')
            keyAlias localProperties.getProperty('keyAlias')
            keyPassword localProperties.getProperty('keyPassword')
        }
        debug {
            //storeFile file('debug.keystore')
            //storePassword 'android'
            //keyAlias 'androiddebugkey'
            //keyPassword 'android'
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

// Ajoute cette section pour inclure le SDK AdMob
dependencies {
    implementation 'com.google.android.gms:play-services-ads:24.9.0'
    // Les packages Flutter font le lien, mais ces lignes forcent Android
    // à inclure les fichiers nécessaires au démarrage.
    implementation 'com.google.ads.mediation:unity:4.16.6.0'
    //implementation 'com.google.ads.mediation:pangle:7.8.5.9.0'
    implementation 'com.google.firebase:firebase-messaging:25.0.1' // ou version actuelle
}

apply plugin: 'com.google.gms.google-services'